<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrography</title>
  <meta
    name="description"
    content="Astrography is an interactive map of our local stellar neighborhood with 3D, globe, and Mollweide views."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#maps-section">Skip to maps</a>

  <div id="loader" class="active" role="status" aria-live="polite">Loading stars …</div>

  <header>
    <button id="menu-toggle" type="button" aria-label="Toggle filter menu" aria-controls="filter-sidebar" aria-expanded="false">☰</button>
    <h1>Astrography</h1>
  </header>

  <div class="main-container">
    <aside id="filter-sidebar" class="sidebar" aria-label="Filters">
      <h2>Filters</h2>
      <form id="filters-form">
        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Map Projections</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="checkbox" id="map-mollweide" name="map-projection" value="mollweide" checked />
              <label for="map-mollweide">Mollweide</label>
            </div>
            <div class="filter-item">
              <input type="checkbox" id="map-true" name="map-projection" value="true" />
              <label for="map-true">True Coordinates</label>
            </div>
            <div class="filter-item">
              <input type="checkbox" id="map-globe" name="map-projection" value="globe" />
              <label for="map-globe">Globe</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Stellar Class</legend>
          <div class="filter-content">
            <div id="stellar-class-container"></div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Size</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="radio" id="size-stellar-class" name="size" value="stellar-class" checked />
              <label for="size-stellar-class">Stellar class-based</label>
            </div>
            <div class="filter-item">
              <input type="radio" id="size-distance" name="size" value="distance" />
              <label for="size-distance">Distance-based</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Color</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="radio" id="color-stellar-class" name="color" value="stellar-class" checked />
              <label for="color-stellar-class">Stellar class-based</label>
            </div>
            <div class="filter-item">
              <input type="radio" id="color-constellation" name="color" value="constellation" />
              <label for="color-constellation">Constellation</label>
            </div>
            <div class="filter-item">
              <input type="radio" id="color-galactic-plane" name="color" value="galactic-plane" />
              <label for="color-galactic-plane">Galactic plane</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Opacity</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="radio" id="opacity-absolute-mag" name="opacity" value="absolute-magnitude" checked />
              <label for="opacity-absolute-mag">Absolute magnitude-based</label>
            </div>
            <div class="filter-item">
              <input type="radio" id="opacity-75" name="opacity" value="75" />
              <label for="opacity-75">75% opacity</label>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="star-opacity-slider">Star opacity</label>
              <div class="paired-inputs">
                <input type="range" id="star-opacity-slider" name="star-opacity" min="0" max="100" value="100" step="1" />
                <input type="number" id="star-opacity-number" name="star-opacity" min="0" max="100" value="100" step="1" />
                <span id="star-opacity-value">100</span><span>%</span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="star-name-opacity-slider">Star name opacity</label>
              <div class="paired-inputs">
                <input type="range" id="star-name-opacity-slider" name="star-name-opacity" min="0" max="100" value="100" step="1" />
                <input type="number" id="star-name-opacity-number" name="star-name-opacity" min="0" max="100" value="100" step="1" />
                <span id="star-name-opacity-value">100</span><span>%</span>
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Stars Shown</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="radio" id="stars-shown-all" name="stars-shown" value="all" checked />
              <label for="stars-shown-all">All stars</label>
            </div>
            <div class="filter-item">
              <input type="radio" id="stars-shown-visible" name="stars-shown" value="visible" />
              <label for="stars-shown-visible">Visible stars (magnitude ․6)</label>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Distance Filter (LY)</legend>
          <div class="filter-content">
            <div class="filter-item filter-item--stacked">
              <label for="min-distance-slider">Minimum distance</label>
              <div class="paired-inputs">
                <input type="range" id="min-distance-slider" min="0" max="100" value="0" />
                <input type="number" id="min-distance-number" name="min-distance" min="0" max="100" value="0" />
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="max-distance-slider">Maximum distance</label>
              <div class="paired-inputs">
                <input type="range" id="max-distance-slider" min="0" max="100" value="20" />
                <input type="number" id="max-distance-number" name="max-distance" min="0" max="100" value="20" />
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Connections (LY)</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="checkbox" id="enable-connections" name="enable-connections" />
              <label for="enable-connections">Enable connections</label>
            </div>
            <div class="filter-item">
              <div class="paired-inputs paired-inputs--with-suffix">
                <input type="range" id="connection-slider" name="connections" min="1" max="50" value="7" disabled />
                <input type="number" id="connection-number" name="connections" min="1" max="50" value="7" disabled />
                <span>LY</span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="connection-opacity-slider">Line opacity</label>
              <div class="paired-inputs">
                <input type="range" id="connection-opacity-slider" name="connection-opacity" min="0" max="100" value="50" step="1" disabled />
                <input type="number" id="connection-opacity-number" name="connection-opacity" min="0" max="100" value="50" step="1" disabled />
                <span id="connection-opacity-value">50</span><span>%</span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="connection-width-slider">Max thickness</label>
              <div class="paired-inputs">
                <input type="range" id="connection-width-slider" name="connection-width" min="1" max="10" value="5" step="0.5" disabled />
                <input type="number" id="connection-width-number" name="connection-width" min="1" max="10" step="0.5" value="5" disabled />
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="connection-fade-slider">Edge hardness</label>
              <div class="paired-inputs">
                <input type="range" id="connection-fade-slider" name="connection-fade" min="0.5" max="5" value="1" step="0.1" disabled />
                <input type="number" id="connection-fade-number" name="connection-fade" min="0.5" max="5" step="0.1" value="1" disabled />
                </span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="connection-label-size-slider">Label size</label>
              <div class="paired-inputs">
                <input type="range" id="connection-label-size-slider" name="connection-label-size" min="0.5" max="5" value="1" step="0.1" disabled />
                <input type="number" id="connection-label-size-number" name="connection-label-size" min="0.5" max="5" value="1" step="0.1" disabled />
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Isolation Filter</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="checkbox" id="enable-isolation-filter" name="enable-isolation-filter" />
              <label for="enable-isolation-filter">Enable isolation filter</label>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="isolation-slider">Isolation distance (LY)</label>
              <div class="paired-inputs">
                <input type="range" id="isolation-slider" name="isolation" min="1" max="20" value="5" disabled />
                <input type="number" id="isolation-number" name="isolation" min="1" max="20" value="5" disabled />
                <span id="isolation-value">5</span><span> LY</span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="isolation-tolerance-slider">Ignore closest stars: <span id="isolation-tolerance-value">0</span></label>
              <input type="range" id="isolation-tolerance-slider" name="isolation-tolerance" min="0" max="10" value="0" disabled />
            </div>
            <div class="filter-item">
              <input type="checkbox" id="enable-isolation-labeling" name="enable-isolation-labeling" />
              <label for="enable-isolation-labeling">Enable isolation cluster labeling &amp; segmentation</label>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="isolation-grid-slider">Grid subdivision</label>
              <div class="paired-inputs">
                <input type="range" id="isolation-grid-slider" name="isolation-grid-size" min="-10" max="10" step="1" value="1" disabled />
                <input type="number" id="isolation-grid-number" name="isolation-grid-size" min="-10" max="10" step="1" value="1" disabled />
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Density Filter</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="checkbox" id="enable-density-filter" name="enable-density-filter" />
              <label for="enable-density-filter">Enable density filter</label>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-slider">Density radius (LY)</label>
              <div class="paired-inputs">
                <input type="range" id="density-slider" name="density" min="1" max="20" value="10" disabled />
                <input type="number" id="density-number" name="density" min="1" max="20" value="10" disabled />
                <span id="density-value">10</span><span> S</span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-tolerance-slider">Ignore closest stars: <span id="density-tolerance-value">0</span></label>
              <input type="range" id="density-tolerance-slider" name="density-tolerance" min="0" max="10" value="0" disabled />
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-bottom-slider">Bottom cells %</label>
              <div class="paired-inputs">
                <input type="range" id="density-bottom-slider" name="density-bottom-percent" min="1" max="50" value="10" step="1" disabled />
                <input type="number" id="density-bottom-number" name="density-bottom-percent" min="1" max="50" value="10" step="1" disabled />
                <span id="density-bottom-value">10</span><span>%</span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-top-slider">Top cells %</label>
              <div class="paired-inputs">
                <input type="range" id="density-top-slider" name="density-top-percent" min="1" max="50" value="10" step="1" disabled />
                <input type="number" id="density-top-number" name="density-top-percent" min="1" max="50" value="10" step="1" disabled />
                <span id="density-top-value">10</span><span>%</span>
              </div>
            </div>
            <div class="filter-item">
              <input type="checkbox" id="enable-density-labeling" name="enable-density-labeling" />
              <label for="enable-density-labeling">Enable density cluster labeling &amp; segmentation</label>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-grid-slider">Grid subdivision</label>
              <div class="paired-inputs">
                <input type="range" id="density-grid-slider" name="density-grid-size" min="-10" max="10" step="1" value="1" disabled />
                <input type="number" id="density-grid-number" name="density-grid-size" min="-10" max="10" step="1" value="1" disabled />
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-opacity-slider">Overlay opacity</label>
              <div class="paired-inputs">
                <input type="range" id="density-opacity-slider" name="density-opacity" min="0" max="100" value="100" step="1" disabled />
                <input type="number" id="density-opacity-number" name="density-opacity" min="0" max="100" value="100" step="1" disabled />
                <span id="density-opacity-value">100</span><span>%</span>
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-line-width-slider">Line thickness</label>
              <div class="paired-inputs">
                <input type="range" id="density-line-width-slider" name="density-line-width" min="5" max="60" value="30" step="1" disabled />
                <input type="number" id="density-line-width-number" name="density-line-width" min="5" max="60" value="30" step="1" disabled />
              </div>
            </div>
            <div class="filter-item filter-item--stacked">
              <label for="density-fade-slider">Edge hardness</label>
              <div class="paired-inputs">
                <input type="range" id="density-fade-slider" name="density-fade" min="0.5" max="5" value="1" step="0.1" disabled />
                <input type="number" id="density-fade-number" name="density-fade" min="0.5" max="5" step="0.1" value="1" disabled />
                </span>
              </div>
            </div>
          </div>
        </fieldset>

        <fieldset id="save-presets-fieldset">
          <legend class="collapsible" aria-expanded="false" tabindex="0" role="button">Save Presets</legend>
          <div class="filter-content">
            <div class="filter-item">
              <input type="checkbox" id="enable-save-presets" name="enable-save-presets" />
              <label for="enable-save-presets">Remember filters &amp; edits</label>
            </div>
            <div class="filter-item">
              <button type="button" id="clear-saved-presets">Clear Saved Presets</button>
            </div>
            <div class="filter-item filter-item--actions">
              <button type="button" id="download-edits">Download Edits</button>
              <button type="button" id="upload-edits">Upload Edits</button>
              <input type="file" id="upload-edits-input" accept="application/json" hidden />
            </div>
          </div>
        </fieldset>
      </form>
    </aside>

    <section id="maps-section" class="maps-section">
      <div class="map-container">
        <h2>True Coordinates Map</h2>
        <button class="fullscreen-btn" type="button" aria-label="Fullscreen True Coordinates Map">⤫</button>
        <canvas id="map3D"></canvas>
      </div>
      <div class="map-container">
        <h2>Globe Map</h2>
        <button class="fullscreen-btn" type="button" aria-label="Fullscreen Globe Map">☫</button>
        <canvas id="sphereMap"></canvas>
      </div>
      <div class="map-container">
        <h2>Mollweide Map</h2>
        <button class="fullscreen-btn" type="button" aria-label="Fullscreen Mollweide Map">⊫</button>
        <canvas id="mollweideMap"></canvas>
        <div class="export-controls">
          <button id="export-mollweide" class="export-btn" type="button">Export</button>
          <button id="export-png" class="export-btn" type="button" hidden>PNG</button>
          <button id="export-pdf" class="export-btn" type="button" hidden>PDF</button>
          <button id="toggle-label-editor" class="export-btn" type="button">Edit Labels</button>
          <button id="toggle-line-editor" class="export-btn" type="button">Edit Lines</button>
          <button id="undo-edit" class="export-btn" type="button">Undo</button>
        </div>
      </div>
    </section>
  </div>

  <div id="tooltip" class="hidden" role="dialog" aria-live="polite" aria-hidden="true"></div>

  <div class="label-container"></div>
  <div id="export-selection-overlay" style="display:none">
    <div id="export-selection-rect"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module" src="script.js"></script>
  <script type="module">
    import { initFilterUI } from './ui/filterUI.js';
    window.addEventListener('DOMContentLoaded', () => {
      initFilterUI();
    });
  </script>
</body>
</html>
